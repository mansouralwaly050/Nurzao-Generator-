<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة الاستشارات الذكية - Nurzao Consulting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
        }
        
        h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        
        .subtitle {
            color: #666;
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        
        .features {
            text-align: right;
            margin: 40px 0;
        }
        
        .feature {
            margin: 15px 0;
            padding: 15px;
            background: #f5f5f5;
            border-right: 4px solid #667eea;
            border-radius: 8px;
        }
        
        .feature strong {
            color: #667eea;
        }
        
        .cta-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        
        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        
        .status {
            margin-top: 40px;
            padding: 20px;
            background: #e8f5e9;
            border-radius: 10px;
            color: #2e7d32;
        }
        
        .logo {
            font-size: 3em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🎯</div>
        <h1>منصة الاستشارات الذكية</h1>
        <p class="subtitle">Nurzao Consulting Marketplace</p>
        
        <div class="features">
            <div class="feature">
                <strong>💼 للخبراء:</strong> عرض خدماتك والحصول على عملاء جدد
            </div>
            <div class="feature">
                <strong>👥 للعملاء:</strong> ابحث عن أفضل الخبراء وحجز استشاراتك
            </div>
            <div class="feature">
                <strong>💰 الدفع الآمن:</strong> معالجة آمنة للمدفوعات الفورية
            </div>
            <div class="feature">
                <strong>💬 دردشة فورية:</strong> تواصل مباشر مع الخبراء
            </div>
        </div>
        
        <button class="cta-button">ابدأ الآن</button>
        
        <div class="status">
            ✅ المنصة قيد الإطلاق - سيتم تفعيل جميع الميزات قريباً
        </div>
    </div>
</body>
</html>
